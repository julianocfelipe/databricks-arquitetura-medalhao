site_name: Trabalho 3 — Databricks Arquitetura Medalhão
site_description: Pipeline de dados com Databricks implementando a Arquitetura Medalhão (Landing → Bronze → Silver → Gold)
site_author: Juliano

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - content.code.copy

nav:
  - Início: index.md
  - Arquitetura:
      - Visão Geral: arquitetura/visao-geral.md
      - Landing: arquitetura/landing.md
      - Bronze: arquitetura/bronze.md
      - Silver: arquitetura/silver.md
      - Gold: arquitetura/gold.md
  - Modelo Dimensional: modelo-dimensional.md
  - Jobs & Pipelines: jobs-pipelines.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - tables
